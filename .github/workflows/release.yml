name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o lowkey-linux-amd64 ./cmd/lowkey
          GOOS=linux GOARCH=arm64 go build -o lowkey-linux-arm64 ./cmd/lowkey
          GOOS=darwin GOARCH=amd64 go build -o lowkey-darwin-amd64 ./cmd/lowkey
          GOOS=darwin GOARCH=arm64 go build -o lowkey-darwin-arm64 ./cmd/lowkey

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            lowkey-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
